name: Deploy assetsフォルダ限定・ブランチ別配信

on:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read
  pages: write
  id-token: write
  # 過去の成果物をダウンロードするために actions の読み込み権限を追加
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 💡 直前の「成功したデプロイ」（mainでもdevelopでも問わない）の成果物を取得する
      # これが「今まで配信していたサイト全体」のベースになる
      - name: Download previous deployment artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching the last successful artifact from this workflow..."
          RUN_ID=$(gh run list --workflow "${{ github.workflow }}" --status success --limit 1 --json databaseId | jq -r '.[0].databaseId' 2>/dev/null || echo "")

          if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
            echo "Found previous run ID: $RUN_ID. Downloading artifact..."
            mkdir -p prev_content
            if gh run download "$RUN_ID" -n github-pages -D prev_content; then
              if [ -f "prev_content/artifact.tar" ]; then
                tar -xf prev_content/artifact.tar -C prev_content
                rm -f prev_content/artifact.tar
              fi
            else
              echo "Could not download previous artifact (期限切れ等). Skipping merge."
              rm -rf prev_content
            fi
          else
            echo "No previous successful run found. Skipping merge."
          fi

      # 💡 「前回配信していたサイト全体」をベースにコピーし、
      # 今回pushされたブランチに対応する部分だけを最新化する。
      # → mainの更新がdevelopの/dev/を壊さず、developの更新もmainの本番ファイルを壊さない。
      # → assets/からアプリフォルダが削除された場合は、該当ブランチのセクションをPagesからも削除する。
      - name: Build publish_dir (merge current branch into previous site)
        run: |
          set -e
          mkdir -p publish_dir

          if [ -d "prev_content" ]; then
            cp -r prev_content/. publish_dir/ 2>/dev/null || true
          fi

          BRANCH="${{ github.ref_name }}"

          # 現在のassets/配下に存在するアプリ名一覧
          CURRENT_APPS=""
          if [ -d "assets" ]; then
            for appDir in assets/*/; do
              [ -d "$appDir" ] || continue
              CURRENT_APPS="$CURRENT_APPS $(basename "$appDir")"
            done
          fi

          # 前回までPagesに配信されていたアプリ名一覧
          PUBLISHED_APPS=""
          if [ -d "publish_dir" ]; then
            for appDir in publish_dir/*/; do
              [ -d "$appDir" ] || continue
              PUBLISHED_APPS="$PUBLISHED_APPS $(basename "$appDir")"
            done
          fi

          # 1. 削除検知: 配信済みだが今のassets/に無いアプリ → このブランチが担当するセクションを削除
          for appName in $PUBLISHED_APPS; do
            stillExists=false
            for cur in $CURRENT_APPS; do
              if [ "$cur" = "$appName" ]; then
                stillExists=true
                break
              fi
            done

            if [ "$stillExists" = false ]; then
              if [ "$BRANCH" = "main" ]; then
                echo "assets/$appName が削除されたため、本番側ファイルを削除します（dev/は維持）"
                find "publish_dir/$appName" -mindepth 1 -maxdepth 1 ! -name "dev" -exec rm -rf {} + 2>/dev/null || true
              elif [ "$BRANCH" = "develop" ]; then
                echo "assets/$appName が削除されたため、dev/ファイルを削除します"
                rm -rf "publish_dir/$appName/dev"
              fi

              # 本番・dev両方とも空になったら、アプリフォルダ自体を削除
              if [ -d "publish_dir/$appName" ] && [ -z "$(ls -A "publish_dir/$appName" 2>/dev/null)" ]; then
                rm -rf "publish_dir/$appName"
              fi
            fi
          done

          # 2. 更新処理: 現在のassets/にあるアプリを最新化
          for appName in $CURRENT_APPS; do
            appDir="assets/$appName"
            mkdir -p "publish_dir/$appName"

            if [ "$BRANCH" = "main" ]; then
              # 本番用ファイル（ja/, en/, config.json等）だけを最新化。dev/ には触らない
              find "publish_dir/$appName" -mindepth 1 -maxdepth 1 ! -name "dev" -exec rm -rf {} +
              cp -r "$appDir"/* "publish_dir/$appName/" 2>/dev/null || true
            elif [ "$BRANCH" = "develop" ]; then
              # dev/ フォルダの中身だけを最新化。本番側のファイルは一切触らない
              rm -rf "publish_dir/$appName/dev"
              mkdir -p "publish_dir/$appName/dev"
              cp -r "$appDir"/* "publish_dir/$appName/dev/" 2>/dev/null || true
            fi
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './publish_dir'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

